<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن بيس 2026 مجانا</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background-color: rgba(30, 30, 30, 0.95);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #00ffcc;
        }

        h1, h2 { color: #00ffcc; }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: #00ffcc;
            color: #1a1a1a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #00cca3; transform: scale(1.02); }
        .hidden { display: none; }
        
        .msg-red { color: #ff4d4d; font-weight: bold; font-size: 1.4em; margin: 15px 0; display: block; }
        
        .final-big-btn {
            background-color: #444;
            color: white;
            padding: 15px;
            font-size: 13px;
            line-height: 1.5;
            height: auto;
            white-space: normal;
            border: 1px dashed #00ffcc;
            cursor: default;
            margin-bottom: 10px;
        }

        .retry-msg {
            font-size: 1.8em;
            color: #ffff00;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .next-btn {
            background-color: #ffffff;
            color: #000;
            border: 2px solid #00ffcc;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="retryHeader" class="hidden">
        <div class="retry-msg">ماحصيناش بالاك تصدقلك هذي الخطرة</div>
    </div>

    <div id="step1">
        <h1>شحن بيس 2026 مجانا</h1>
        <input type="text" id="team" placeholder="اسم الفريق">
        <select id="device">
            <option value="">اختر الجهاز</option>
            <option value="Android">Android</option>
            <option value="iOS">iOS</option>
            <option value="PC">PC</option>
            <option value="PS5">PlayStation 5</option>
            <option value="Xbox">Xbox</option>
        </select>
        <select id="coins">
            <option value="">اختر كمية الكوينز</option>
            <option value="250">250 كوينز</option>
            <option value="500">500 كوينز</option>
            <option value="750">750 كوينز</option>
            <option value="1000">1000 كوينز</option>
        </select>
        <button onclick="toStep2()">التالي</button>
    </div>

    <div id="step2" class="hidden">
        <h2>مصادقة</h2>
        <p>يجب ان تصادق على بعض الامور</p>
        <button onclick="toStepSigma()">التالي</button>
    </div>

    <div id="stepSigma" class="hidden">
        <h2>هل ياسين سيغما؟</h2>
        <button onclick="startLogic()">نعم</button>
        <button onclick="wrongSigma()">لا</button>
        <div id="sigmaErr" class="msg-red"></div>
    </div>

    <div id="stepFinal" class="hidden">
        <h2 id="finalTitle">اتختار</h2>
        <div id="gameButtons"></div>
        <div id="finalArea" class="hidden">
            <span id="redText" class="msg-red"></span>
            <button class="final-big-btn">اياشتها ياسين يتمنيك بيك يانت متحشمش ولاهو سيغما تع صح انا صراحة ادعم الخيار2</button>
            <button class="next-btn" onclick="resetPage()">التالي</button>
        </div>
    </div>
</div>

<script>
    let currentVal = 0;

    function toStep2() {
        const t = document.getElementById('team').value;
        const d = document.getElementById('device').value;
        const c = document.getElementById('coins').value;
        if(t && d && c) {
            currentVal = parseInt(c);
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        } else { alert("عمر المعلومات!"); }
    }

    function toStepSigma() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('stepSigma').classList.remove('hidden');
    }

    function wrongSigma() {
        document.getElementById('sigmaErr').innerText = "امالا انت حمار قاع ياسين ومشي سيغما";
    }

    function startLogic() {
        document.getElementById('stepSigma').classList.add('hidden');
        document.getElementById('stepFinal').classList.remove('hidden');
        renderOptions(currentVal);
    }

    function renderOptions(val) {
        const container = document.getElementById('gameButtons');
        container.innerHTML = "";

        if (val <= 0) {
            finishGame("هكذا لاتكون طماع");
            return;
        }

        const btnMain = document.createElement('button');
        btnMain.innerText = val + " كوينز";
        btnMain.onclick = () => finishGame("لاحمار لاسبعة فرنك");

        let nextVal = val - 250;
        if (nextVal < 0) nextVal = 0;

        const btnSub = document.createElement('button');
        btnSub.innerText = nextVal + " كوينز";
        btnSub.onclick = () => renderOptions(nextVal);

        container.appendChild(btnMain);
        container.appendChild(btnSub);
    }

    function finishGame(msg) {
        document.getElementById('finalTitle').innerText = "حكمة اليوم";
        document.getElementById('gameButtons').innerHTML = "";
        document.getElementById('redText').innerText = msg;
        document.getElementById('finalArea').classList.remove('hidden');
    }

    function resetPage() {
        // تصفير الواجهة والعودة للبداية
        document.getElementById('stepFinal').classList.add('hidden');
        document.getElementById('finalArea').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('retryHeader').classList.remove('hidden');
        
        // تصفير المدخلات
        document.getElementById('team').value = "";
        document.getElementById('device').selectedIndex = 0;
        document.getElementById('coins').selectedIndex = 0;
        document.getElementById('sigmaErr').innerText = "";
        document.getElementById('finalTitle').innerText = "اتختار";
    }
</script>

</body>
</html>
